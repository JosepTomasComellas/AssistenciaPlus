server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Salut
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Blazor WASM: totes les rutes cap a index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Assets estàtics: caché llarga
    location ~* \.(js|css|wasm|woff2?|ttf|eot|svg|ico|png|jpg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Compressió
    gzip on;
    gzip_types text/plain application/javascript application/wasm
               text/css application/json image/svg+xml;
    gzip_vary on;
}
