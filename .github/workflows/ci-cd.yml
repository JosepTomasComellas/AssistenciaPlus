name: CI/CD - AssistenciaPlus

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  # ── 1. Build i test ───────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/AssistenciaPlus.sln

      - name: Build
        run: dotnet build src/AssistenciaPlus.sln --no-restore -c Release

      # Activa quan tinguis projectes de test
      # - name: Test
      #   run: dotnet test src/AssistenciaPlus.sln --no-build -c Release

  # ── 2. Desplegar al servidor (només branca main) ──────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            cd /docker/AssistenciaPlus
            echo "=== Iniciant desplegament: $(date) ==="
            bash scripts/deploy.sh --update
            echo "=== Desplegament completat: $(date) ==="
